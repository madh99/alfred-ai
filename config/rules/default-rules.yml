# Alfred — Default Security Rules
# Rules are evaluated in priority order (lower number = higher priority).
# First matching rule wins.

rules:
  # Allow all read-level skills (calculator, system_info, web_search) for everyone
  - id: allow-all-read
    effect: allow
    priority: 100
    scope: global
    actions: ["*"]
    riskLevels: [read]

  # Allow write-level skills in DMs
  - id: allow-write-for-dm
    effect: allow
    priority: 200
    scope: global
    actions: ["*"]
    riskLevels: [write]
    conditions:
      chatType: dm

  # Rate-limit write actions: max 30 per hour per user
  - id: rate-limit-write
    effect: allow
    priority: 250
    scope: user
    actions: ["*"]
    riskLevels: [write]
    rateLimit:
      maxInvocations: 30
      windowSeconds: 3600

  # Deny destructive and admin actions by default
  - id: deny-destructive
    effect: deny
    priority: 500
    scope: global
    actions: ["*"]
    riskLevels: [destructive, admin]

  # Catch-all deny
  - id: deny-default
    effect: deny
    priority: 9999
    scope: global
    actions: ["*"]
    riskLevels: [read, write, destructive, admin]
