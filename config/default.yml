# Alfred — Default Configuration
# Override values via environment variables or a custom config file.

name: Alfred

telegram:
  token: ""
  enabled: false

discord:
  token: ""
  enabled: false

whatsapp:
  enabled: false
  dataPath: ./data/whatsapp

matrix:
  homeserverUrl: https://matrix.org
  accessToken: ""
  userId: ""
  enabled: false

signal:
  apiUrl: http://localhost:8080
  phoneNumber: ""
  enabled: false

llm:
  provider: anthropic
  model: claude-sonnet-4-6
  temperature: 0.7
  maxTokens: 4096

# Multi-model routing (uncomment to enable):
# llm:
#   default:
#     provider: anthropic
#     model: claude-sonnet-4-6
#   strong:
#     provider: anthropic
#     model: claude-opus-4-7
#   fast:
#     provider: openai
#     model: gpt-4o-mini
#   embeddings:
#     provider: openai
#     model: text-embedding-3-small
#   local:
#     provider: ollama
#     model: llama3.2

storage:
  path: ./data/alfred.db

logger:
  level: info
  pretty: true
  auditLogPath: ./data/audit.log

security:
  rulesPath: ./config/rules
  defaultEffect: deny
